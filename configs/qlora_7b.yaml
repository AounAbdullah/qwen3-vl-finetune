# ================================================================
# QLoRA fine-tune config for Qwen3-VL-7B
# Adjust model_name_or_path and dataset_name for your use case
# ================================================================

# --- Model ---
model_name_or_path: Qwen/Qwen3-VL-7B-Instruct   # swap to Qwen3-VL-2B-Instruct for smaller GPU

# --- Dataset ---
dataset_name: your_dataset_here   # HF dataset id or local path
dataset_text_field: text           # column name with the training text

# --- Output ---
output_dir: ./checkpoints/qwen3-vl-7b-qlora

# --- LoRA (PEFT) ---
use_peft: true
lora_r: 16                  # rank — higher = more params, more capacity
lora_alpha: 32              # scaling factor, usually 2x r
lora_dropout: 0.05
lora_target_modules:        # which layers to adapt
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# --- Quantization (QLoRA = LoRA + 4-bit) ---
load_in_4bit: true
bnb_4bit_quant_type: nf4          # nf4 is standard for QLoRA
bnb_4bit_compute_dtype: bfloat16

# --- Training hyperparameters ---
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8    # effective batch = 1 * 8 = 8
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_seq_length: 2048

# --- Precision ---
bf16: true           # use bfloat16 if your GPU supports it (Ampere+)
fp16: false

# --- Logging & saving ---
logging_steps: 10
save_steps: 100
save_total_limit: 3
eval_strategy: steps
eval_steps: 100

# --- Efficiency ---
gradient_checkpointing: true    # saves VRAM at cost of ~20% speed
dataloader_num_workers: 4
